<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birgerik Core Admin Mockup - Cute Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fecdd3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fda4af; }
    </style>
</head>
<body class="bg-teal-50 text-gray-800 font-sans flex h-screen overflow-hidden antialiased selection:bg-teal-200" x-data="{ activeTab: 'question-sets', examModalOpen: false }">

    <aside class="w-64 bg-white border-r border-teal-100 flex flex-col shrink-0 shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-teal-50">
            <div class="bg-teal-100 text-teal-500 p-1.5 rounded-lg mr-3">
                <i data-lucide="book-heart" class="w-5 h-5"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-teal-900">Birgerik Core</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <button @click="activeTab = 'certifications'" :class="{ 'bg-teal-400 text-white shadow-md shadow-teal-200 translate-x-1': activeTab === 'certifications', 'text-gray-500 hover:bg-teal-50 hover:text-teal-600': activeTab !== 'certifications' }" class="flex items-center gap-3 px-4 py-2.5 w-full rounded-xl text-sm font-bold transition-all duration-300">
                <i data-lucide="award" class="w-4 h-4"></i> 資格管理
            </button>
            <button @click="activeTab = 'question-sets'" :class="{ 'bg-teal-400 text-white shadow-md shadow-teal-200 translate-x-1': activeTab === 'question-sets', 'text-gray-500 hover:bg-teal-50 hover:text-teal-600': activeTab !== 'question-sets' }" class="flex items-center gap-3 px-4 py-2.5 w-full rounded-xl text-sm font-bold transition-all duration-300">
                <i data-lucide="folder-heart" class="w-4 h-4"></i> 問題集管理
            </button>
            <button @click="activeTab = 'questions'" :class="{ 'bg-teal-400 text-white shadow-md shadow-teal-200 translate-x-1': activeTab === 'questions', 'text-gray-500 hover:bg-teal-50 hover:text-teal-600': activeTab !== 'questions' }" class="flex items-center gap-3 px-4 py-2.5 w-full rounded-xl text-sm font-bold transition-all duration-300">
                <i data-lucide="layout-list" class="w-4 h-4"></i> 問題管理
            </button>
            <button @click="activeTab = 'exams'" :class="{ 'bg-teal-400 text-white shadow-md shadow-teal-200 translate-x-1': activeTab === 'exams', 'text-gray-500 hover:bg-teal-50 hover:text-teal-600': activeTab !== 'exams' }" class="flex items-center gap-3 px-4 py-2.5 w-full rounded-xl text-sm font-bold transition-all duration-300">
                <i data-lucide="check-circle" class="w-4 h-4"></i> 試験管理
            </button>
            <button @click="activeTab = 'users'" :class="{ 'bg-teal-400 text-white shadow-md shadow-teal-200 translate-x-1': activeTab === 'users', 'text-gray-500 hover:bg-teal-50 hover:text-teal-600': activeTab !== 'users' }" class="flex items-center gap-3 px-4 py-2.5 w-full rounded-xl text-sm font-bold transition-all duration-300">
                <i data-lucide="users" class="w-4 h-4"></i> ユーザ管理
            </button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 relative">
        <div class="max-w-5xl mx-auto space-y-6">

            <div x-show="activeTab === 'question-sets'" x-cloak>
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h1 class="text-2xl font-extrabold text-teal-900 tracking-tight">問題集管理</h1>
                        <p class="text-sm text-gray-500 mt-1">学習に使用する問題セットを管理します 📚</p>
                    </div>
                    <button class="flex items-center gap-2 bg-teal-500 text-white px-5 py-2.5 rounded-full text-sm font-bold hover:bg-teal-600 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-teal-200 transition-all duration-300">
                        <i data-lucide="plus" class="w-4 h-4"></i> 新規作成
                    </button>
                </div>

                <div class="bg-white border-2 border-teal-50 rounded-2xl shadow-sm overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-teal-50/50 text-teal-700 border-b-2 border-teal-50">
                            <tr>
                                <th class="px-6 py-4 font-bold rounded-tl-2xl">問題集名</th>
                                <th class="px-6 py-4 font-bold">対象資格</th>
                                <th class="px-6 py-4 font-bold">問題数</th>
                                <th class="px-6 py-4 font-bold">公開</th>
                                <th class="px-6 py-4 text-right font-bold rounded-tr-2xl">アクション</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-teal-50" x-data="{ sets: [{id: 1, name: 'AWS SAA 模擬問題 1', cert: 'AWS SAA', count: 65, active: true}, {id: 2, name: 'AWS SAA 模擬問題 2', cert: 'AWS SAA', count: 65, active: false}] }">
                            <template x-for="set in sets" :key="set.id">
                                <tr class="hover:bg-teal-50/50 transition-colors duration-200 group">
                                    <td class="px-6 py-4 font-bold text-gray-800" x-text="set.name"></td>
                                    <td class="px-6 py-4 text-gray-500" x-text="set.cert"></td>
                                    <td class="px-6 py-4 text-gray-500">
                                        <span class="bg-teal-100 text-teal-600 px-2 py-1 rounded-md text-xs font-bold" x-text="set.count + '問'"></span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <button @click="set.active = !set.active" :class="set.active ? 'bg-teal-400' : 'bg-gray-200'" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-teal-400/50 focus:ring-offset-2">
                                            <span :class="set.active ? 'translate-x-6' : 'translate-x-1'" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-300 shadow-sm"></span>
                                        </button>
                                    </td>
                                    <td class="px-6 py-4 text-right">
                                        <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                            <button class="p-2 text-teal-400 hover:text-teal-600 hover:bg-teal-100 rounded-xl transition-all"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                            <button class="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="activeTab === 'exams'" x-cloak>
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h1 class="text-2xl font-extrabold text-teal-900 tracking-tight">試験管理</h1>
                        <p class="text-sm text-gray-500 mt-1">試験のルールを設定します ⏱️</p>
                    </div>
                    <button @click="examModalOpen = true" class="flex items-center gap-2 bg-teal-500 text-white px-5 py-2.5 rounded-full text-sm font-bold hover:bg-teal-600 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-teal-200 transition-all duration-300">
                        <i data-lucide="plus" class="w-4 h-4"></i> 試験作成
                    </button>
                </div>
                </div>
        </div>
    </main>

    <div x-show="examModalOpen" class="fixed inset-0 z-50 flex items-center justify-center" x-cloak>
        <div x-show="examModalOpen" x-transition.opacity class="absolute inset-0 bg-teal-900/20 backdrop-blur-sm" @click="examModalOpen = false"></div>
        
        <div x-show="examModalOpen" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-8 scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 scale-95"
             class="relative bg-white rounded-3xl shadow-2xl shadow-teal-200 w-full max-w-md overflow-hidden flex flex-col border-2 border-teal-50">
            
            <div class="px-6 py-5 border-b-2 border-teal-50 flex items-center justify-between bg-teal-50/30">
                <h2 class="text-lg font-bold text-teal-900 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5 text-teal-400"></i> 試験の作成
                </h2>
                <button @click="examModalOpen = false" class="p-1.5 text-gray-400 hover:text-teal-600 hover:bg-teal-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-6">
                <p class="text-sm text-gray-500 text-center">ここに可愛い入力フォームが入ります✨</p>
            </div>

            <div class="px-6 py-4 border-t-2 border-teal-50 bg-teal-50/30 flex justify-end gap-3">
                <button @click="examModalOpen = false" class="px-5 py-2.5 text-sm font-bold text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-full transition-colors">キャンセル</button>
                <button class="px-5 py-2.5 text-sm font-bold text-white bg-teal-400 hover:bg-teal-500 hover:-translate-y-0.5 hover:shadow-md hover:shadow-teal-200 rounded-full transition-all">作成する</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
