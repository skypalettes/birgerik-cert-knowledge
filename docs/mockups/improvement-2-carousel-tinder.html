<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>改善案2: カルーセル形式（Tinder風）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e;
      color: #dcddde;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #252525;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .header-close {
      background: none;
      border: none;
      color: #8e8e8e;
      cursor: pointer;
      font-size: 20px;
      padding: 8px;
    }

    /* Progress */
    .progress-container {
      padding: 16px 20px 12px;
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .progress-text {
      font-size: 13px;
      color: #8e8e8e;
      margin-bottom: 8px;
      text-align: center;
    }

    .progress-bar {
      background: #2a2a2a;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, #4a9eff, #5ca8ff);
      height: 100%;
      transition: width 0.3s;
    }

    /* Question Area */
    .question-area {
      flex-shrink: 0;
      padding: 20px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
    }

    .question-text {
      font-size: 15px;
      line-height: 1.7;
      color: #dcddde;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Selected Choices Preview */
    .selected-preview {
      padding: 12px 20px;
      background: #252525;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      min-height: 60px;
    }

    .preview-label {
      font-size: 11px;
      color: #6e6e6e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .preview-items {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preview-item {
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #8e8e8e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .preview-item.selected {
      background: #264f78;
      border-color: #4a9eff;
      color: #dcddde;
    }

    .preview-check {
      width: 12px;
      height: 12px;
      border: 2px solid #5d5d5d;
      border-radius: 50%;
    }

    .preview-item.selected .preview-check {
      background: #4a9eff;
      border-color: #4a9eff;
    }

    /* Card Carousel */
    .carousel-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .card-stack {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 100%;
      max-height: 300px;
    }

    .choice-card {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #2d2d2d;
      border: 2px solid #3d3d3d;
      border-radius: 16px;
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .choice-card.current {
      z-index: 3;
      transform: translateY(0) scale(1);
    }

    .choice-card.next {
      z-index: 2;
      transform: translateY(12px) scale(0.95);
      opacity: 0.7;
    }

    .choice-card.prev {
      z-index: 1;
      transform: translateY(24px) scale(0.9);
      opacity: 0.4;
    }

    .choice-card.selected {
      background: #264f78;
      border-color: #4a9eff;
      box-shadow: 0 8px 32px rgba(74, 158, 255, 0.4);
    }

    .choice-card.out-left {
      transform: translateX(-150%) rotate(-20deg);
      opacity: 0;
    }

    .choice-card.out-right {
      transform: translateX(150%) rotate(20deg);
      opacity: 0;
    }

    /* Card Number */
    .card-number {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      color: #8e8e8e;
    }

    /* Navigation Buttons */
    .card-nav {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 16px 20px;
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #3d3d3d;
      background: #2d2d2d;
      color: #dcddde;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .nav-btn.skip {
      border-color: #5d5d5d;
    }

    .nav-btn.skip:hover {
      background: #353535;
      border-color: #6d6d6d;
    }

    .nav-btn.select {
      border-color: #4a9eff;
      background: #264f78;
      box-shadow: 0 4px 16px rgba(74, 158, 255, 0.3);
    }

    .nav-btn.select:hover {
      background: #2e5a8a;
    }

    /* Bottom Bar */
    .bottom-bar {
      background: #252525;
      border-top: 1px solid #333;
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .btn-primary {
      background: #4a9eff;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      min-height: 50px;
      transition: all 0.2s;
    }

    .btn-primary:disabled {
      background: #3d3d3d;
      color: #6e6e6e;
      cursor: not-allowed;
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    /* Instructions */
    .instructions {
      text-align: center;
      padding: 12px 20px;
      background: #252525;
      border-top: 1px solid #2a2a2a;
      font-size: 12px;
      color: #6e6e6e;
      flex-shrink: 0;
    }

    .instructions span {
      color: #8e8e8e;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span style="font-size: 22px;">📖</span>
        <span class="header-title">学習モード</span>
      </div>
      <button class="header-close">✕</button>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div class="progress-text">問題 1 / 15 • 6% 完了</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 6.67%"></div>
      </div>
    </div>

    <!-- Question -->
    <div class="question-area">
      <div class="question-text">
        VPCで異なるアベイラビリティーゾーン（AZ）間の通信に料金が発生するのはどの場合ですか？
      </div>
    </div>

    <!-- Selected Choices Preview -->
    <div class="selected-preview">
      <div class="preview-label">選択済み</div>
      <div class="preview-items" id="previewItems">
        <div class="preview-item">
          <div class="preview-check"></div>
          <span>選択肢なし</span>
        </div>
      </div>
    </div>

    <!-- Instructions -->
    <div class="instructions">
      👈 <span>スキップ</span> ・ 👉 <span>この選択肢を選ぶ</span>
    </div>

    <!-- Card Carousel -->
    <div class="carousel-container">
      <div class="card-stack" id="cardStack">
        <div class="choice-card current" data-index="0">
          <div class="card-number">1/4</div>
          同じリージョン内の異なるAZ間
        </div>
        <div class="choice-card next" data-index="1">
          <div class="card-number">2/4</div>
          同じAZ内の通信
        </div>
        <div class="choice-card prev" data-index="2">
          <div class="card-number">3/4</div>
          インターネットゲートウェイ経由の通信
        </div>
        <div class="choice-card" data-index="3" style="display: none;">
          <div class="card-number">4/4</div>
          VPCピアリング接続の通信
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="card-nav">
      <button class="nav-btn skip" onclick="skipCard()">
        <span>✕</span>
      </button>
      <button class="nav-btn select" onclick="selectCard()">
        <span>✓</span>
      </button>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <button class="btn-primary" id="answerBtn" disabled onclick="checkAnswer()">回答を確認</button>
    </div>
  </div>

  <script>
    let currentCardIndex = 0;
    let cards = Array.from(document.querySelectorAll('.choice-card'));
    let selectedCards = [];

    function updateCardPositions() {
      cards.forEach((card, index) => {
        card.classList.remove('current', 'next', 'prev');

        if (index === currentCardIndex) {
          card.classList.add('current');
          card.style.display = 'flex';
        } else if (index === currentCardIndex + 1) {
          card.classList.add('next');
          card.style.display = 'flex';
        } else if (index === currentCardIndex + 2) {
          card.classList.add('prev');
          card.style.display = 'flex';
        } else {
          card.style.display = 'none';
        }
      });

      // ボタンを有効化/無効化
      document.getElementById('answerBtn').disabled = selectedCards.length === 0;
    }

    function skipCard() {
      if (currentCardIndex >= cards.length - 1) return;

      const currentCard = cards[currentCardIndex];
      currentCard.classList.add('out-left');

      setTimeout(() => {
        currentCardIndex++;
        updateCardPositions();
      }, 300);
    }

    function selectCard() {
      if (currentCardIndex >= cards.length - 1) return;

      const currentCard = cards[currentCardIndex];
      const cardText = currentCard.textContent.trim().replace(/\d+\/\d+/, '').trim();

      // 既に選択されている場合は解除
      const existingIndex = selectedCards.findIndex(c => c.index === currentCardIndex);
      if (existingIndex > -1) {
        selectedCards.splice(existingIndex, 1);
      } else {
        selectedCards.push({
          index: currentCardIndex,
          text: cardText
        });
      }

      currentCard.classList.toggle('selected');
      updatePreview();

      setTimeout(() => {
        currentCard.classList.add('out-right');
        setTimeout(() => {
          currentCardIndex++;
          updateCardPositions();
        }, 300);
      }, 200);
    }

    function updatePreview() {
      const previewItems = document.getElementById('previewItems');

      if (selectedCards.length === 0) {
        previewItems.innerHTML = `
          <div class="preview-item">
            <div class="preview-check"></div>
            <span>選択肢なし</span>
          </div>
        `;
      } else {
        previewItems.innerHTML = selectedCards.map(card => `
          <div class="preview-item selected">
            <div class="preview-check"></div>
            <span>${card.text.substring(0, 20)}...</span>
          </div>
        `).join('');
      }
    }

    function checkAnswer() {
      alert(`選択した回答: ${selectedCards.map(c => c.text).join(', ')}`);
    }

    // キーボードショートカット
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') skipCard();
      if (e.key === 'ArrowRight') selectCard();
    });
  </script>
</body>
</html>
