<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>改善案3: ボトムシート形式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e;
      color: #dcddde;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Header */
    .header {
      background: #252525;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .header-close {
      background: none;
      border: none;
      color: #8e8e8e;
      cursor: pointer;
      font-size: 20px;
      padding: 8px;
    }

    /* Progress Bar */
    .progress-bar {
      background: #2a2a2a;
      height: 3px;
      flex-shrink: 0;
    }

    .progress-fill {
      background: linear-gradient(90deg, #4a9eff, #5ca8ff);
      height: 100%;
      transition: width 0.3s;
    }

    /* Question Area (上部) */
    .question-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #1e1e1e;
    }

    .question-meta {
      font-size: 13px;
      color: #8e8e8e;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .question-text {
      font-size: 17px;
      line-height: 1.8;
      color: #dcddde;
      margin-bottom: 24px;
    }

    .question-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: #2d2d2d;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #8e8e8e;
    }

    /* Collapse Button */
    .collapse-btn {
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      color: #8e8e8e;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .collapse-btn:hover {
      background: #353535;
      border-color: #4d4d4d;
    }

    .question-area.collapsed {
      flex: 0 0 auto;
    }

    .question-area.collapsed .question-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .question-area.collapsed .question-tags {
      display: none;
    }

    /* Bottom Sheet */
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #252525;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      height: 60vh;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }

    @media (min-width: 768px) {
      .bottom-sheet {
        height: 50vh;
      }
    }

    /* Drag Handle */
    .drag-handle {
      padding: 12px 0;
      display: flex;
      justify-content: center;
      cursor: grab;
      flex-shrink: 0;
    }

    .drag-handle::before {
      content: '';
      width: 40px;
      height: 4px;
      background: #3d3d3d;
      border-radius: 2px;
    }

    /* Sheet Header */
    .sheet-header {
      padding: 8px 20px 16px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .sheet-title {
      font-size: 14px;
      color: #8e8e8e;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Choices Container */
    .choices-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .choice {
      background: #2d2d2d;
      border: 2px solid #3d3d3d;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 68px;
    }

    .choice:active {
      transform: scale(0.98);
    }

    .choice:hover {
      background: #353535;
      border-color: #4d4d4d;
    }

    .choice.selected {
      background: #264f78;
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
    }

    .choice.correct {
      background: #1e3a1e;
      border-color: #2ea043;
    }

    .choice.wrong {
      background: #3a1e1e;
      border-color: #da3633;
    }

    .choice-marker {
      width: 24px;
      height: 24px;
      border: 3px solid #5d5d5d;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }

    .choice.selected .choice-marker {
      background: #4a9eff;
      border-color: #4a9eff;
    }

    .choice.correct .choice-marker {
      background: #2ea043;
      border-color: #2ea043;
    }

    .choice.correct .choice-marker::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .choice.wrong .choice-marker {
      background: #da3633;
      border-color: #da3633;
    }

    .choice.wrong .choice-marker::after {
      content: '✕';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .choice-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Action Button */
    .sheet-action {
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      background: #252525;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .btn-primary {
      background: #4a9eff;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      min-height: 52px;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(74, 158, 255, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #3d3d3d;
      color: #6e6e6e;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Explanation */
    .explanation {
      background: #2a2445;
      border: 1px solid #3a3465;
      border-radius: 10px;
      padding: 16px;
      margin: 16px 20px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .explanation-header {
      font-weight: 600;
      color: #b9a5ff;
      margin-bottom: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .explanation-text {
      font-size: 14px;
      line-height: 1.6;
      color: #dcddde;
    }

    /* Resize animation */
    .bottom-sheet.expanded {
      height: 80vh;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span style="font-size: 22px;">📖</span>
        <span class="header-title">学習モード</span>
      </div>
      <button class="header-close">✕</button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar">
      <div class="progress-fill" style="width: 6.67%"></div>
    </div>

    <!-- Question Area -->
    <div class="question-area" id="questionArea">
      <div class="question-meta">
        <span>問題 1 / 15</span>
        <span>6% 完了</span>
      </div>

      <div class="question-text" id="questionText">
        VPCで異なるアベイラビリティーゾーン（AZ）間の通信に料金が発生するのはどの場合ですか？
      </div>

      <div class="question-tags">
        <span class="tag">🏷️ VPC</span>
        <span class="tag">💰 料金</span>
        <span class="tag">📍 AZ</span>
      </div>

      <button class="collapse-btn" onclick="toggleCollapse()">
        <span id="collapseIcon">▼</span>
        <span id="collapseText">問題文を折りたたむ</span>
      </button>
    </div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" id="bottomSheet">
      <!-- Drag Handle -->
      <div class="drag-handle"></div>

      <!-- Sheet Header -->
      <div class="sheet-header">
        <div class="sheet-title">選択肢を選んでください</div>
      </div>

      <!-- Choices -->
      <div class="choices-container">
        <div class="choice" onclick="selectChoice(this)">
          <div class="choice-marker"></div>
          <div class="choice-text">同じリージョン内の異なるAZ間</div>
        </div>

        <div class="choice" onclick="selectChoice(this)">
          <div class="choice-marker"></div>
          <div class="choice-text">同じAZ内の通信</div>
        </div>

        <div class="choice" onclick="selectChoice(this)">
          <div class="choice-marker"></div>
          <div class="choice-text">インターネットゲートウェイ経由の通信</div>
        </div>

        <div class="choice" onclick="selectChoice(this)">
          <div class="choice-marker"></div>
          <div class="choice-text">VPCピアリング接続の通信</div>
        </div>
      </div>

      <!-- Action Button -->
      <div class="sheet-action">
        <button class="btn-primary" id="answerBtn" disabled onclick="checkAnswer()">回答を確認</button>
      </div>
    </div>
  </div>

  <script>
    let selectedChoice = null;
    let isCollapsed = false;

    function selectChoice(choice) {
      document.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
      choice.classList.add('selected');
      selectedChoice = choice;
      document.getElementById('answerBtn').disabled = false;
    }

    function toggleCollapse() {
      const questionArea = document.getElementById('questionArea');
      const collapseIcon = document.getElementById('collapseIcon');
      const collapseText = document.getElementById('collapseText');

      isCollapsed = !isCollapsed;

      if (isCollapsed) {
        questionArea.classList.add('collapsed');
        collapseIcon.textContent = '▲';
        collapseText.textContent = '問題文を展開';
      } else {
        questionArea.classList.remove('collapsed');
        collapseIcon.textContent = '▼';
        collapseText.textContent = '問題文を折りたたむ';
      }
    }

    function checkAnswer() {
      const choices = document.querySelectorAll('.choice');
      choices[0].classList.add('correct');

      if (selectedChoice !== choices[0]) {
        selectedChoice.classList.add('wrong');
      }

      // 解説を問題エリアに追加
      const explanation = document.createElement('div');
      explanation.className = 'explanation';
      explanation.innerHTML = `
        <div class="explanation-header">
          <span>💡</span>
          <span>解説</span>
        </div>
        <div class="explanation-text">
          同じリージョン内の異なるAZ間で通信する場合、データ転送料金が発生します。
          同じAZ内の通信は無料ですが、AZをまたぐとGB単位で課金されます。
        </div>
      `;

      const questionArea = document.getElementById('questionArea');
      questionArea.appendChild(explanation);

      // 問題文を自動展開
      if (isCollapsed) {
        toggleCollapse();
      }

      // ボタンテキストを変更
      document.getElementById('answerBtn').textContent = '次の問題へ';
      document.getElementById('answerBtn').onclick = () => alert('次の問題へ');
    }

    // ドラッグでボトムシートのサイズ変更（簡易版）
    let startY = 0;
    let startHeight = 0;

    document.querySelector('.drag-handle').addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
      startHeight = document.getElementById('bottomSheet').offsetHeight;
    });

    document.querySelector('.drag-handle').addEventListener('touchmove', (e) => {
      const deltaY = startY - e.touches[0].clientY;
      const newHeight = Math.max(200, Math.min(window.innerHeight * 0.8, startHeight + deltaY));
      document.getElementById('bottomSheet').style.height = newHeight + 'px';
    });
  </script>
</body>
</html>
