# ============================================================
# このファイルは birgerik-vault リポジトリ用のテンプレートです。
#
# 配置先: birgerik-vault リポジトリの
#         .github/workflows/sync.yml
#
# このリポジトリ (birgerik-cert-knowledge) には .github/workflows/
# ではなく docs/ 配下に置いているため、ここでは実行されません。
# birgerik-vault 側へコピーして使用してください。
#
# 必要な Secrets (birgerik-vault リポジトリに設定):
#   - NEXT_PUBLIC_SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#   - CORE_REPO_TOKEN  (irunahub/birgerik-cert-knowledge が private の
#                        場合に必要な read 権限の PAT。public なら削除可)
#
# 注意 (monorepo 構成):
#   birgerik-core は単独リポジトリではなく
#   irunahub/birgerik-cert-knowledge (pnpm workspace) の一部のため、
#   monorepo 全体を checkout し、ワークスペースルートで pnpm install する。
# ============================================================
name: Sync questions to Supabase

on:
  push:
    branches: [main]

# 同一ブランチへの連続 push が重なった場合は直列化する
concurrency:
  group: sync-questions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout question data
        uses: actions/checkout@v4
        with:
          path: data
          fetch-depth: 0 # sync.ts が QUESTIONS_DIR 内で git diff するため全履歴が必須

      - name: Checkout birgerik-core (monorepo)
        uses: actions/checkout@v4
        with:
          repository: irunahub/birgerik-cert-knowledge
          ref: main
          path: core
          token: ${{ secrets.CORE_REPO_TOKEN }} # public 化したらこの行は削除可

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: core/pnpm-lock.yaml

      - name: Install (workspace root)
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Sync questions
        working-directory: core/birgerik-core
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QUESTIONS_DIR: ${{ github.workspace }}/data
          SYNC_BEFORE_SHA: ${{ github.event.before }}
          SYNC_AFTER_SHA: ${{ github.sha }}
        # 削除を Supabase にも反映する場合は末尾に --force-delete を追加
        # (Obsidian でのファイル削除 = 問題削除。誤削除リスクに注意)
        run: npx tsx scripts/sync.ts --changed-only
